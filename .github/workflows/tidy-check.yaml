name: Tidy Check

# Fails the PR when BUILD files are stale (gazelle) or unformatted. The single
# remediation is `bazel run //:tidy`. Complements Aspect Workflows' build/test CI;
# it does not replace it.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tidy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            common --announce_rc --color=yes --curses=yes
            common --show_progress_rate_limit=60 --show_timestamps

      - name: Run //:tidy and verify the tree is clean
        run: |
          bazel run //:tidy
          # Ignore MODULE.bazel.lock: Bazel may (re)generate it while resolving the
          # module graph for this run, and it is not committed by the template.
          # gazelle/format never touch it, so a lock change is not a tidy failure.
          changed="$(git status --porcelain -- ':!MODULE.bazel.lock')"
          if [ -n "$changed" ]; then
            echo "::error::BUILD files are stale or unformatted. Run 'bazel run //:tidy' and commit the result."
            echo "$changed"
            git diff -- ':!MODULE.bazel.lock'
            exit 1
          fi
