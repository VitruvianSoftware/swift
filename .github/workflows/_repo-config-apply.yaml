name: Repo Config Apply

# Gated apply-on-merge for the repo_config Pulumi module.
#
# When enabled, runs `pulumi up` against the repo_config stack on pushes to the
# default branch that touch the module, applying the GitHub-settings change that
# was reviewed via the separate preview workflow on the pull request.
#
# DISABLED BY DEFAULT — opt in by setting the repository variable
# REPO_CONFIG_AUTO_APPLY=true (Settings -> Secrets and variables -> Actions ->
# Variables). Uses the same shared GitHub App credentials as the preview
# workflow: set its app id in the PULUMI_APP_ID variable and its private key in
# the APP_PRIVATE_KEY secret, plus PULUMI_ACCESS_TOKEN for the Pulumi backend.
on:
    push:
        # repo_config's Pulumi default branch is "main". GitHub Actions `on:`
        # triggers cannot use ${{ }} expressions, so this is the literal
        # branch name — repos whose default branch isn't "main" should edit this
        # list to match.
        branches: ["main"]
        paths: ["infrastructure/pulumi/repo_config/**"]

permissions:
    contents: read

jobs:
    apply:
        if: ${{ vars.REPO_CONFIG_AUTO_APPLY == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Install Bazel
              uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
              with:
                  bazelisk-cache: true
                  repository-cache: true
                  bazelrc: |
                      common --announce_rc --color=yes --curses=yes
                      common --show_progress_rate_limit=60 --show_timestamps

            - name: Mint a GitHub App token for the Pulumi GitHub provider
              id: app-token
              uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
              with:
                  app-id: ${{ vars.PULUMI_APP_ID }}
                  private-key: ${{ secrets.APP_PRIVATE_KEY }}

            - name: Pulumi up (repo_config)
              env:
                  GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
                  GITHUB_OWNER: ${{ github.repository_owner }}
                  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
              run: bazel run //infrastructure/pulumi/repo_config:up -- --stack dev --yes
