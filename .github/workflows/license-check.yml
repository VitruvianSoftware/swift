name: License Check

# Verifies every source file carries the Apache-2.0 header. Headers are applied
# to the tree at delivery (`bazel run //tools/license:add`); this gate keeps them
# from regressing. Ships only when the project is rendered with a license.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            common --announce_rc --color=yes --curses=yes
            common --show_progress_rate_limit=60 --show_timestamps

      - name: Verify license headers
        run: |
          # :check exits non-zero (and lists offenders) if any header is missing.
          bazel run //tools/license:check
